<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Live Chat</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SockJS -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

    <!-- STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Real-Time Chat</h4>
        </div>

        <div class="card-body" style="height:400px; overflow-y:auto;" id="chatBox"></div>

        <div class="card-footer">
            <div class="row g-2">
                <div class="col-md-3">
                    <input type="text" id="sender" class="form-control" placeholder="Your Name">
                </div>
                <div class="col-md-7">
                    <input type="text" id="message" class="form-control" placeholder="Type message...">
                </div>
                <div class="col-md-2 d-grid">
                    <button class="btn btn-success" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

</div>

<script>

    let stompClient = null;

    function connect() {

        console.log("Connecting to WebSocket...");

        const socket = new SockJS('http://localhost:8080/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {

            console.log("CONNECTED SUCCESSFULLY");
            console.log(frame);

            stompClient.subscribe('/topic/messages', function (response) {
                const message = JSON.parse(response.body);
                showMessage(message);
            });

        }, function (error) {
            console.error("Connection error:", error);
        });
    }

    function sendMessage() {

        if (!stompClient || !stompClient.connected) {
            alert("Not connected to server.");
            return;
        }

        const sender = document.getElementById('sender').value.trim();
        const content = document.getElementById('message').value.trim();

        if (!sender || !content) return;

        const chatMessage = {
            sender: sender,
            content: content
        };

        stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));

        document.getElementById('message').value = '';
    }

    function showMessage(message) {

        const chatBox = document.getElementById('chatBox');

        const messageElement = document.createElement('div');
        messageElement.classList.add('mb-2');

        messageElement.innerHTML = `
            <div class="p-2 rounded bg-secondary text-white">
                <strong>${message.sender}:</strong> ${message.content}
            </div>
        `;

        chatBox.appendChild(messageElement);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    connect();

</script>

</body>
</html>
